apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
  - ../../base

namespace: ai-task-platform

images:
  - name: yourdockerhubuser/ai-task-backend
    newTag: "staging"
  - name: yourdockerhubuser/ai-task-frontend
    newTag: "staging"
  - name: yourdockerhubuser/ai-task-worker
    newTag: "staging"

patches:
  # Minimal replicas for staging (cost saving)
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
  - patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 3
    target:
      kind: HorizontalPodAutoscaler

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - NODE_ENV=staging
      - LOG_LEVEL=debug
      - ALLOWED_ORIGINS=https://staging.yourdomain.com
