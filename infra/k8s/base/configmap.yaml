apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: ai-task-platform
data:
  NODE_ENV: "production"
  PORT: "5000"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_QUEUE_NAME: "task_queue"
  MONGODB_HOST: "mongodb-service"
  MONGODB_PORT: "27017"
  MONGODB_DB: "aitasks"
  ALLOWED_ORIGINS: "https://yourdomain.com"
  JWT_EXPIRES_IN: "7d"
  LOG_LEVEL: "info"
  WORKER_POLL_TIMEOUT: "5"
  WORKER_MAX_RETRIES: "3"
