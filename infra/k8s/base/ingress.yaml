apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-task-ingress
  namespace: ai-task-platform
  annotations:
    # Use nginx ingress controller (installed separately)
    kubernetes.io/ingress.class: "nginx"
    # Auto-provision TLS via cert-manager + Let's Encrypt
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Security headers
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Increase proxy body size for task input
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Rate limiting at ingress level (extra layer)
    nginx.ingress.kubernetes.io/limit-rps: "20"
spec:
  tls:
    - hosts:
        - yourdomain.com
      secretName: ai-task-tls
  rules:
    - host: yourdomain.com
      http:
        paths:
          # API — route /api/* to backend service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          # Everything else — frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
